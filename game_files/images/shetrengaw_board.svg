<svg width="100%" viewBox="0 0 680 580" role="img" xmlns="http://www.w3.org/2000/svg">
<title>SHETRENGAW board — starting position</title>
<desc>8x8 game board with files D through G and ranks 1 through 8, showing starting piece positions for Igto (blue, ranks 1-2) and Mawdige (red, ranks 7-8), mountain safe spaces on ranks 4-5, and the mountain zone.</desc>
