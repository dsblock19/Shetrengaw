<svg width="100%" viewBox="0 0 680 220" role="img" xmlns="http://www.w3.org/2000/svg">
<title>SHETRENGAW — The Game of the Two Peoples</title>
<desc>Decorative header for the SHETRENGAW GitHub repository, showing the game title, subtitle, and a stylised board motif.</desc>
<defs>
  <style>
    .title { font-family:Georgia,serif; font-size:42px; font-weight:bold; fill:#c9a84c; letter-spacing:0.18em; text-anchor:middle; }
    .sub   { font-family:Georgia,serif; font-size:14px; font-style:italic; fill:#a09070; text-anchor:middle; }
    .ver   { font-family:Georgia,serif; font-size:10px; fill:#7a6030; text-anchor:middle; letter-spacing:0.12em; }
    .side  { font-family:Georgia,serif; font-size:11px; font-weight:bold; text-anchor:middle; }
  </style>
</defs>

<!-- Background -->
<rect width="680" height="220" fill="#1a1209"/>

<!-- Subtle board pattern — left side mini-grid -->
<g opacity="0.18">
  <rect x="18" y="18"  width="22" height="22" fill="#c4a870"/>
  <rect x="40" y="18"  width="22" height="22" fill="#8b6535"/>
  <rect x="18" y="40"  width="22" height="22" fill="#8b6535"/>
  <rect x="40" y="40"  width="22" height="22" fill="#c4a870"/>
  <rect x="18" y="62"  width="22" height="22" fill="#c4a870"/>
  <rect x="40" y="62"  width="22" height="22" fill="#8b6535"/>
  <rect x="18" y="84"  width="22" height="22" fill="#8b6535"/>
  <rect x="40" y="84"  width="22" height="22" fill="#c4a870"/>
</g>
<g opacity="0.18">
  <rect x="618" y="120" width="22" height="22" fill="#c4a870"/>
  <rect x="640" y="120" width="22" height="22" fill="#8b6535"/>
  <rect x="618" y="142" width="22" height="22" fill="#8b6535"/>
  <rect x="640" y="142" width="22" height="22" fill="#c4a870"/>
  <rect x="618" y="164" width="22" height="22" fill="#c4a870"/>
  <rect x="640" y="164" width="22" height="22" fill="#8b6535"/>
  <rect x="618" y="186" width="22" height="22" fill="#8b6535"/>
  <rect x="640" y="186" width="22" height="22" fill="#c4a870"/>
</g>

<!-- Gold rule top -->
<line x1="80" y1="22" x2="600" y2="22" stroke="#7a6030" stroke-width="1" opacity="0.6"/>

<!-- Title -->
<text class="title" x="340" y="88">SHETRENGAW</text>

<!-- Divider ornament -->
<line x1="120" y1="102" x2="268" y2="102" stroke="#7a6030" stroke-width="0.8"/>
<polygon points="340,95 346,102 340,109 334,102" fill="#8b6914"/>
<line x1="412" y1="102" x2="560" y2="102" stroke="#7a6030" stroke-width="0.8"/>

<!-- Subtitle -->
<text class="sub" x="340" y="126">The Game of the Two Peoples</text>

<!-- Side badges -->
<rect x="98"  y="146" width="96" height="28" rx="4" fill="#0e2030" stroke="#4a8fc4" stroke-width="1"/>
<text class="side" x="146" y="160" fill="#4a8fc4" dominant-baseline="central">IGTO</text>
<text style="font-family:Georgia,serif;font-size:9px;fill:#7ab8e8;text-anchor:middle" x="146" y="172">The Nomadic People</text>

<rect x="486" y="146" width="96" height="28" rx="4" fill="#300e0e" stroke="#c44a4a" stroke-width="1"/>
<text class="side" x="534" y="160" fill="#c44a4a" dominant-baseline="central">MAWDIGE</text>
<text style="font-family:Georgia,serif;font-size:9px;fill:#e87a7a;text-anchor:middle" x="534" y="172">The Settled Kingdom</text>

<!-- Centre info -->
<text class="ver" x="340" y="158">RULES VERSION 7</text>
<text class="ver" x="340" y="172">Descended from Chaturanga</text>

<!-- Piece symbols row -->
<g opacity="0.55" fill="none" stroke="#8b6914" stroke-width="0.8">
  <circle cx="210" cy="196" r="7"/>
  <circle cx="232" cy="196" r="7"/>
  <circle cx="254" cy="196" r="7"/>
  <circle cx="276" cy="196" r="7"/>
  <circle cx="298" cy="196" r="7"/>
  <circle cx="320" cy="196" r="7"/>
  <circle cx="342" cy="196" r="7"/>
  <circle cx="364" cy="196" r="7"/>
  <circle cx="386" cy="196" r="7"/>
  <circle cx="408" cy="196" r="7"/>
  <circle cx="430" cy="196" r="7"/>
  <circle cx="452" cy="196" r="7"/>
  <circle cx="474" cy="196" r="7"/>
</g>
<text style="font-family:Georgia,serif;font-size:7px;fill:#8b6914;text-anchor:middle" x="210" y="199" dominant-baseline="central">GW</text>
<text style="font-family:Georgia,serif;font-size:7px;fill:#8b6914;text-anchor:middle" x="232" y="199" dominant-baseline="central">RT</text>
<text style="font-family:Georgia,serif;font-size:7px;fill:#8b6914;text-anchor:middle" x="254" y="199" dominant-baseline="central">AS</text>
<text style="font-family:Georgia,serif;font-size:7px;fill:#8b6914;text-anchor:middle" x="276" y="199" dominant-baseline="central">RD</text>
<text style="font-family:Georgia,serif;font-size:7px;fill:#8b6914;text-anchor:middle" x="298" y="199" dominant-baseline="central">PO</text>
<text style="font-family:Georgia,serif;font-size:7px;fill:#8b6914;text-anchor:middle" x="320" y="199" dominant-baseline="central">AS</text>
<text style="font-family:Georgia,serif;font-size:7px;fill:#8b6914;text-anchor:middle" x="342" y="199" dominant-baseline="central">RT</text>
<text style="font-family:Georgia,serif;font-size:7px;fill:#8b6914;text-anchor:middle" x="364" y="199" dominant-baseline="central">GW</text>
<text style="font-family:Georgia,serif;font-size:7px;fill:#8b6914;text-anchor:middle" x="386" y="199" dominant-baseline="central">TI</text>
<text style="font-family:Georgia,serif;font-size:7px;fill:#8b6914;text-anchor:middle" x="408" y="199" dominant-baseline="central">TI</text>
<text style="font-family:Georgia,serif;font-size:7px;fill:#8b6914;text-anchor:middle" x="430" y="199" dominant-baseline="central">TI</text>
<text style="font-family:Georgia,serif;font-size:7px;fill:#8b6914;text-anchor:middle" x="452" y="199" dominant-baseline="central">TI</text>
<text style="font-family:Georgia,serif;font-size:7px;fill:#8b6914;text-anchor:middle" x="474" y="199" dominant-baseline="central">TI</text>

<!-- Gold rule bottom -->
<line x1="80" y1="212" x2="600" y2="212" stroke="#7a6030" stroke-width="1" opacity="0.6"/>

</svg>
