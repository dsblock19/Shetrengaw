  <rect x="156" y="86"  width="24" height="24"/>
  <rect x="60"  y="110" width="24" height="24"/><rect x="84"  y="110" width="24" height="24"/>
  <rect x="108" y="110" width="24" height="24"/><!-- piece -->
  <rect x="132" y="110" width="24" height="24"/><rect x="156" y="110" width="24" height="24"/>
  <rect x="60"  y="134" width="24" height="24"/><rect x="84"  y="134" width="24" height="24"/>
  <rect x="108" y="134" width="24" height="24"/><rect x="132" y="134" width="24" height="24"/>
  <rect x="156" y="134" width="24" height="24"/>
  <rect x="60"  y="158" width="24" height="24"/><rect x="84"  y="158" width="24" height="24"/>
