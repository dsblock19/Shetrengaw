  <rect x="156" y="158" width="24" height="24"/>
</g>
<!-- RAWD: moves exactly 1 square. Both RAWDAW+RAJA: fwd, fwd-diag×2, sideways×2 -->
<!-- piece center = col2,row2. fwd=row1. -->
<!-- row1,col1=84,86  row1,col2=108,86  row1,col3=132,86 -->
<!-- row2,col1=60,110 (left 1sq)        row2,col3=156,110 (right 1sq) -->
<!-- REMOVED: row2,col0=36 and row2,col4=180 (those would be 2sq away) -->
<rect x="84"  y="86"  width="24" height="24" fill="#c9a84c"/><!-- fwd-diag L -->
<rect x="108" y="86"  width="24" height="24" fill="#c9a84c"/><!-- fwd -->
<rect x="132" y="86"  width="24" height="24" fill="#c9a84c"/><!-- fwd-diag R -->
<rect x="84"  y="110" width="24" height="24" fill="#c9a84c"/><!-- left 1sq -->
<rect x="132" y="110" width="24" height="24" fill="#c9a84c"/><!-- right 1sq -->
<!-- RAWDAW only: back-diag (1sq) -->
<rect x="84"  y="134" width="24" height="24" fill="#8b6914"/>
<rect x="132" y="134" width="24" height="24" fill="#8b6914"/>
<!-- piece -->
<rect x="108" y="110" width="24" height="24" fill="#b8860b"/>
<text class="pcode" x="120" y="122">RD</text>

<text class="note" x="120" y="196">↑ forward (Igto perspective)</text>
<text class="note" x="120" y="208">gold = both · dark gold = RAWDAW only</text>
<text class="note" x="120" y="220">RAJA cannot move back-diagonal</text>


