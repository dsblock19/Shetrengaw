<svg width="100%" viewBox="0 0 680 600" role="img" xmlns="http://www.w3.org/2000/svg">
<title>SHETRENGAW piece movement reference</title>
<desc>Movement diagrams for all six piece types. Each 5x5 grid shows the piece at center. Gold squares are squares the piece can reach. Red squares are capture-only. Dark gold squares are RAWDAW-only back-diagonal moves.</desc>
<defs>
  <style>
    .note { font-family:Georgia,serif; font-size:8.5px; fill:#a09070; text-anchor:middle; font-style:italic; }
    .leg  { font-family:Georgia,serif; font-size:9px;   fill:#a09070; dominant-baseline:central; }
    .hdr  { font-family:Georgia,serif; font-size:14px;  font-weight:bold; fill:#c9a84c; text-anchor:middle; }
    .ptitle { font-family:Georgia,serif; font-size:13px; font-weight:bold; fill:#c9a84c; text-anchor:middle; }
    .psub   { font-family:Georgia,serif; font-size:9px;  fill:#a09070; text-anchor:middle; }
    .pcode  { font-family:Georgia,serif; font-size:9px;  font-weight:bold; fill:#1a1209; text-anchor:middle; dominant-baseline:central; }
  </style>
</defs>

<!-- Background -->
<rect width="680" height="600" fill="#1a1209"/>
<text class="hdr" x="340" y="24">Piece Movement Reference — Porawt</text>

<!-- ═══════════════════════════════════════════════════════
     Grid geometry:
     Row 1 grids: top-left corners at x=60,290,520  y=62
     Row 2 grids: top-left corners at x=60,290,520  y=262
     Each grid: 5 cols × 5 rows, sq=24px
     Grid width = 120px. Grid center x = left + 60.
     Centers: col1=120, col2=350, col3=580
     ═══════════════════════════════════════════════════════ -->

<!-- ════════════ ROW 1 ════════════ -->

<!-- ─── RAWD — grid left=60, center-x=120 ─────────────── -->
<text class="ptitle" x="120" y="46">RAWD</text>
<text class="psub"   x="120" y="57">Igto: RAWDAW · Mawdige: RAJA</text>
<g fill="#2e2010" stroke="#1a1209" stroke-width="1">
  <rect x="60"  y="62"  width="24" height="24"/><rect x="84"  y="62"  width="24" height="24"/>
  <rect x="108" y="62"  width="24" height="24"/><rect x="132" y="62"  width="24" height="24"/>
  <rect x="156" y="62"  width="24" height="24"/>
  <rect x="60"  y="86"  width="24" height="24"/><rect x="84"  y="86"  width="24" height="24"/>
