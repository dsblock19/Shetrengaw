<!-- ═══ FOOTER NOTES ═══ -->
<line x1="40" y1="500" x2="640" y2="500" stroke="#4a2e10" stroke-width="0.5"/>
<text class="note" x="340" y="516">Promoted TISHLE (★): all moves and captures apply in both forward and backward directions.</text>
<text class="note" x="340" y="530">GAWJA restriction is absolute — cannot enter or cross ranks 4–5 under any circumstances.</text>
<text class="note" x="340" y="544">Sliding pieces (POR, RATHAW) are blocked by the first piece encountered in their path.</text>
<text class="note" x="340" y="558">Diagrams show Igto perspective (↑ = toward Mawdige). Mawdige moves in the reverse direction.</text>

