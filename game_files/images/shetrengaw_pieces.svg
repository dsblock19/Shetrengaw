<svg width="100%" viewBox="0 0 680 600" role="img" xmlns="http://www.w3.org/2000/svg">
<title>SHETRENGAW piece movement reference</title>
<desc>Movement diagrams for all six piece types. Each diagram shows a 5x5 grid with the piece at center. Gold squares show where the piece can move or capture. Red squares show capture-only squares. Dark gold squares show RAWDAW-only moves.</desc>
<defs>
  <style>
    .tt  { font-family:Georgia,serif; font-size:13px; font-weight:bold; fill:#c9a84c; text-anchor:middle; }
    .sub { font-family:Georgia,serif; font-size:9px;  fill:#a09070; text-anchor:middle; }
    .note{ font-family:Georgia,serif; font-size:8.5px; fill:#a09070; text-anchor:middle; font-style:italic; }
    .leg { font-family:Georgia,serif; font-size:9px;  fill:#a09070; dominant-baseline:central; }
    .hdr { font-family:Georgia,serif; font-size:14px; font-weight:bold; fill:#c9a84c; text-anchor:middle; }
  </style>
</defs>

<!-- Background -->
<rect width="680" height="600" fill="#1a1209"/>

<!-- Title -->
<text class="hdr" x="340" y="24">Piece Movement Reference — Porawt</text>

<!-- ═══════════════════════════════════════════════════════
     GRID HELPER: 5x5, sq=24, uniform dark fill for empties
     Empty sq: #2e2010  Piece: #b8860b  Move: #c9a84c (bright)
     Capture-only: #c44a4a  RAWDAW-only: #8b6914
     ═══════════════════════════════════════════════════════ -->

